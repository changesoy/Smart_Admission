<!doctype html>
<!--
  智慧入学·学区治理一站式可视化门户
  ⚠️ 修改前必读: CONTRIBUTING.md
  主页面:集成学区地图查询、招生政策、入学材料、FAQ、政民互动等模块
  依赖: Leaflet 1.9.4, Turf 6.5.0, Bootstrap 5.3.2, Bootstrap Icons 1.11.3
  脚本加载顺序不可颠倒: config → dataService → render → policyService → mapService → materialService → faqService → interactionService → main
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智慧入学·学区治理一站式可视化门户</title>

    <!-- Leaflet 地图库 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <!-- Bootstrap 5 UI 框架 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons 图标库 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- 项目自定义样式 -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- 1. 顶部导航条 -->
    <nav class="navbar navbar-dark navbar-custom">
      <div class="container-fluid">
        <span class="navbar-brand">
          <i class="bi bi-buildings"></i>
          泰安市泰山区智慧入学平台
        </span>
      </div>
    </nav>

    <main class="container-fluid py-4">
      <!-- 2. 标题区 -->
      <section class="title-section mb-3">
        <h1 class="page-title">泰安市泰山区智慧入学平台</h1>
        <p class="page-subtitle">一站式义务教育入学信息查询服务</p>
        <p class="page-description">
          为泰山区中小学生与家长提供学区查询、学校信息、招生政策、入学材料清单等服务，助力顺利完成入学报名。
        </p>
      </section>

      <!-- Loading 状态 -->
      <div id="loadingState" class="text-center py-5">
        <div
          class="spinner-border text-primary"
          role="status"
          aria-hidden="true"
        ></div>
        <p class="mt-3 text-muted" id="loadingTip">数据加载中…</p>
      </div>

      <!-- Error 状态 -->
      <div
        id="errorState"
        class="alert alert-danger"
        style="display: none"
      ></div>

      <!-- 主内容(默认隐藏,数据加载完成后显示) -->
      <div id="mainContent" style="display: none">
        <!-- 4. 数据概览卡片 -->
        <section class="stats-section mb-4">
          <div class="row g-3" id="statsRow"></div>
        </section>

        <!-- 5. 搜索 + 学区等级筛选(来自 feature-A-map) -->
        <section id="section-search" class="mb-3">
          <div class="card section-card">
            <div class="card-body py-2">
              <div
                class="d-flex flex-column flex-lg-row gap-2 align-items-stretch align-items-lg-center"
              >
                <div class="input-group flex-grow-1">
                  <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search"></i>
                  </span>
                  <input
                    type="text"
                    id="searchInput"
                    class="form-control border-start-0"
                    placeholder="输入学校、小区、道路或完整地址查询学区"
                  />
                  <button
                    id="searchClearBtn"
                    class="btn btn-outline-secondary"
                    style="display: none"
                    type="button"
                  >
                    <i class="bi bi-x-lg"></i>
                  </button>
                </div>

                <div
                  class="zone-filter-group"
                  role="group"
                  aria-label="学区等级筛选"
                >
                  <label class="zone-filter-label">学区显示：</label>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input zone-stage-check"
                      type="checkbox"
                      id="showMiddleZone"
                      value="初中"
                      checked
                    />
                    <label class="form-check-label" for="showMiddleZone"
                      >初中</label
                    >
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input zone-stage-check"
                      type="checkbox"
                      id="showPrimaryZone"
                      value="小学"
                      checked
                    />
                    <label class="form-check-label" for="showPrimaryZone"
                      >小学</label
                    >
                  </div>
                </div>
              </div>

              <div
                id="searchSuggestions"
                class="search-suggestions"
                style="display: none"
              ></div>
              <div class="form-text mt-1">
                当前先支持本地地址点和关键词匹配，在线地理编码后续接入。
              </div>
            </div>
          </div>
        </section>

        <!-- 5. 地图 + 查询结果面板 -->
        <section class="map-section mb-4">
          <div class="row g-3">
            <div class="col-lg-8">
              <div class="card section-card">
                <div class="card-header section-header">
                  <i class="bi bi-geo-alt-fill"></i>学区地图查询
                </div>
                <div class="card-body p-0">
                  <div id="mapContainer"></div>
                </div>
              </div>
            </div>
            <div class="col-lg-4">
              <div class="card section-card result-card">
                <div class="card-header section-header">
                  <i class="bi bi-info-circle-fill"></i>查询结果
                </div>
                <div class="card-body" id="resultPanel"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- 6. 招生政策总览 -->
        <section class="policy-section mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-file-earmark-text-fill"></i>招生政策总览
            </div>
            <div class="card-body">
              <div class="row" id="policyFilters"></div>
              <div id="policyList"></div>
            </div>
          </div>
        </section>

        <!-- ========== B: 政策模拟区 ========== -->
        <!-- 6B. 政策年度对比 -->
        <section id="section-policy-diff" class="mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-arrow-left-right"></i>政策年度对比
            </div>
            <div class="card-body">
              <div class="row align-items-center mb-3">
                <div class="col-md-5">
                  <label class="form-label small text-muted mb-1"
                    >基准年份</label
                  >
                  <select id="diffYearA" class="form-select"></select>
                </div>
                <div class="col-md-2 text-center">
                  <i class="bi bi-arrow-left-right fs-3 text-warning"></i>
                </div>
                <div class="col-md-5">
                  <label class="form-label small text-muted mb-1"
                    >对比年份</label
                  >
                  <select id="diffYearB" class="form-select"></select>
                </div>
              </div>
              <div id="policyDiffResult"></div>
            </div>
          </div>
        </section>

        <!-- 7. 入学材料清单 -->
        <section class="material-section mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-list-check"></i>入学材料清单
            </div>
            <div class="card-body">
              <div id="material-tabs" class="material-tabs"></div>
              <div class="mt-3">
                <h5 id="material-group-title" class="material-group-title"></h5>
                <p id="material-group-desc" class="material-group-desc"></p>
                <span
                  id="material-stage"
                  class="material-stage badge bg-info text-white"
                ></span>
              </div>
              <div id="material-progress" class="material-progress mt-3"></div>
              <div id="material-list" class="material-list mt-3"></div>
            </div>
          </div>
        </section>

        <!-- 8. 常见问题(FAQ) -->
        <section class="faq-section mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-question-circle-fill"></i>常见问题
            </div>
            <div class="card-body">
              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-search"></i
                  ></span>
                  <input
                    type="text"
                    id="faq-search"
                    class="form-control"
                    placeholder="输入关键词搜索问题或答案"
                  />
                </div>
              </div>
              <div id="faq-categories" class="faq-categories mb-3"></div>
              <div id="faq-list" class="faq-list"></div>
            </div>
          </div>
        </section>

        <!-- 9. 留言建议 -->
        <section id="section-interaction" class="mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-chat-square-dots-fill"></i>留言建议
            </div>
            <div class="card-body">
              <!-- 在线留言 -->
              <h6 class="contact-section-title">
                <i class="bi bi-pencil-square"></i> 在线留言
              </h6>
              <div class="contact-message-form">
                <div class="mb-2">
                  <input
                    type="text"
                    id="msgName"
                    class="form-control form-control-sm"
                    placeholder="您的称呼(可选,匿名留言写'匿名')"
                  />
                </div>
                <div class="mb-2">
                  <select id="msgCategory" class="form-select form-select-sm">
                    <option value="入学咨询">入学咨询</option>
                    <option value="材料问题">材料问题</option>
                    <option value="政策疑问">政策疑问</option>
                    <option value="投诉建议">投诉建议</option>
                  </select>
                </div>
                <div class="mb-2">
                  <textarea
                    id="msgContent"
                    class="form-control form-control-sm"
                    rows="3"
                    placeholder="请描述您的问题或建议"
                    maxlength="200"
                  ></textarea>
                  <div
                    class="contact-message-counter small text-muted text-end"
                  >
                    0/200
                  </div>
                </div>
                <button id="msgSubmitBtn" class="btn btn-primary btn-sm w-100">
                  <i class="bi bi-send"></i> 提交留言
                </button>
              </div>

              <!-- 留言列表 -->
              <h6 class="contact-section-title mt-3">
                <i class="bi bi-card-list"></i> 留言列表
              </h6>
              <div id="messageList" class="contact-message-list"></div>
            </div>
          </div>
        </section>

        <!-- 10. 网站说明 -->
        <section class="boundary-section mb-4">
          <div class="card section-card">
            <div class="card-header section-header">
              <i class="bi bi-info-circle"></i>网站说明
            </div>
            <div class="card-body" id="boundaryNotice"></div>
          </div>
        </section>
      </div>
    </main>

    <!-- 10. 页脚 -->
    <footer class="page-footer text-center py-3">
      <small class="text-muted">
        泰安市泰山区智慧入学平台 · 地图底图 © 天地图 · 国家地理信息公共服务平台
      </small>
    </footer>

    <!-- 第三方库: Leaflet + Turf.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <!-- 项目脚本(顺序不可颠倒) -->
    <script src="js/config.js"></script>
    <script src="js/dataService.js"></script>
    <script src="js/render.js"></script>
    <script src="js/policyService.js"></script>

    <script src="js/mapService.js"></script>
    <script src="js/materialService.js"></script>
    <script src="js/faqService.js"></script>
    <script src="js/interactionService.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
